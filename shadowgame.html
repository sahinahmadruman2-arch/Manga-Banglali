<!DOCTYPE html>
<html>
<head>
<title>Shadow Game Vol 1</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

.topbar{
padding:15px;
background:#111;
position:sticky;
top:0;
}

img{
width:100%;
max-width:800px;
margin:10px 0;
border-radius:8px;
box-shadow:0 0 10px rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="topbar">
<h2>Shadow Game Vol 1</h2>
</div>

<div id="pages"></div>

<script>
let totalPages = 10; // তুমি যত page add করবে এখানে change করবে
let container = document.getElementById("pages");

for(let i=1;i<=totalPages;i++){
let img = document.createElement("img");
img.src = "ShadowGameVol1PG" + i + ".jpg";
container.appendChild(img);
}
</script>

</body>
</html>
